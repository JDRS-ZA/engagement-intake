<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JDRS — Engagement Questionnaire</title>
<meta name="description" content="JDRS Engagement Questionnaire — one comprehensive intake that prepares a full six-stage engagement pack. Designed to guide you, even where you're not sure where to begin." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet" />
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
/* ============================================================
   JDRS Brand Layer (inlined from brand/brand.css)
   ============================================================ */
:root{
  --navy:#0D183C; --royal:#2D6BE0; --violet:#8B6DFF;
  --ink:#1C2845; --muted:#5E6A80; --line:#ECEEF3;
  --surface:#F4F6FA; --chip:#E6F6FD; --chip-ink:#0A6E96;
  --s1:#14306B; --s2:#173D85; --s3:#1B4A9E; --s4:#1E57B4; --s5:#2462C6; --s6:#2D6BE0;
  --ok:#0A5E80; --warn:#B45309; --flag:#B91C1C;
  --masthead:radial-gradient(120% 90% at 82% -12%,rgba(5,174,239,.26),transparent 56%),linear-gradient(135deg,#0D183C 0%,#13294F 54%,#0A1228 100%);
  --font-display:'Sora',system-ui,sans-serif;
  --font-body:'General Sans',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
  --radius:18px; --radius-sm:12px; --radius-xs:8px;
  --shadow-sm:0 1px 2px rgba(10,14,42,.06),0 1px 1px rgba(10,14,42,.04);
  --shadow:0 6px 24px rgba(10,14,42,.08),0 2px 6px rgba(10,14,42,.05);
  --shadow-lg:0 18px 48px rgba(10,14,42,.14);
  --accent:var(--s1);
  --accent-soft:rgba(5,174,239,.10);
  --accent-line:rgba(5,174,239,.30);
  --maxw:800px;
  --ease:cubic-bezier(.22,.61,.36,1); --dur:.36s;
}
*{box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{margin:0;font-family:var(--font-body);color:var(--ink);background:var(--surface);line-height:1.55;font-size:16px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:600;line-height:1.18;margin:0;}
.mono{font-family:var(--font-mono);}
.eyebrow{font-family:var(--font-mono);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
a{color:var(--royal);}

.wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px;}
.app-header{background:var(--masthead);color:#fff;padding:18px 0;position:sticky;top:0;z-index:20;box-shadow:0 2px 14px rgba(10,14,42,.18);}
.app-header .wrap{display:flex;align-items:center;justify-content:space-between;gap:16px;}
.brand-line{display:flex;align-items:center;gap:12px;min-width:0;}
.wordmark{height:26px;width:auto;display:block;}
.tool-name{font-family:var(--font-mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.72);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.header-actions{display:flex;align-items:center;gap:10px;flex:0 0 auto;}

main{padding:30px 0 80px;}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}

.btn{font-family:var(--font-display);font-weight:600;font-size:1rem;border:0;border-radius:999px;padding:.82em 1.5em;cursor:pointer;transition:transform var(--dur) var(--ease),box-shadow var(--dur) var(--ease),background var(--dur) var(--ease),color var(--dur) var(--ease),border-color var(--dur) var(--ease);text-decoration:none;display:inline-flex;align-items:center;gap:.5em;justify-content:center;}
.btn:focus-visible{outline:3px solid var(--accent-line);outline-offset:3px;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:var(--shadow-sm);}
.btn-primary:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line);}
.btn-ghost:hover{color:var(--ink);border-color:var(--accent-line);}
.btn:disabled{opacity:.42;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-sm{font-size:.82rem;padding:.5em .95em;}
.btn-light{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.28);}
.btn-light:hover{background:rgba(255,255,255,.24);}

.intro{padding:46px 40px;text-align:left;}
.intro .eyebrow{margin-bottom:14px;}
.intro h1{font-size:2.3rem;font-weight:700;letter-spacing:-.01em;margin-bottom:14px;}
.intro .lede{font-size:1.12rem;color:var(--muted);max-width:56ch;margin-bottom:22px;}
.intro .reassure{font-size:1rem;color:var(--ink);background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:var(--radius-sm);padding:14px 16px;max-width:60ch;margin-bottom:24px;}
.intro-meta{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:30px;}
.chip{display:inline-flex;align-items:center;gap:.4em;background:var(--chip);color:var(--chip-ink);font-family:var(--font-mono);font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;padding:.42em .8em;border-radius:999px;}
.intro-foot{margin-top:8px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.intro-note{font-size:.86rem;color:var(--muted);}

.stepper{padding:22px 28px 0;}
.stepper-top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:12px;}
.step-count{font-family:var(--font-mono);font-size:.78rem;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;}
.step-title-eyebrow{font-family:var(--font-mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);}
.progress{height:7px;background:var(--line);border-radius:999px;overflow:hidden;}
.progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--royal),var(--accent));border-radius:999px;transition:width var(--dur) var(--ease);}

.screen-body{padding:24px 28px 6px;}
.screen-head{margin-bottom:18px;}
.screen-head h2{font-size:1.6rem;letter-spacing:-.01em;outline:none;}
.screen-head .screen-intro{color:var(--muted);margin-top:6px;font-size:1rem;}

.field{margin:0 0 28px;}
.field-label{display:block;font-family:var(--font-display);font-weight:600;font-size:1.16rem;color:var(--ink);margin-bottom:.3rem;}
.field-guide{color:var(--muted);font-size:.92rem;margin-bottom:.8rem;}
.req{color:var(--accent);font-weight:700;}
.optional-tag{font-family:var(--font-mono);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:.1em .55em;margin-left:.5em;vertical-align:middle;}

input[type=text],textarea,select{width:100%;font-family:var(--font-body);font-size:1rem;color:var(--ink);background:#fff;border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:.8em .9em;transition:border-color var(--dur) var(--ease),box-shadow var(--dur) var(--ease);}
textarea{min-height:112px;resize:vertical;line-height:1.5;}
input[type=text]:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft);}
.input-invalid{border-color:var(--flag)!important;box-shadow:0 0 0 4px rgba(185,28,28,.10)!important;}

.options{display:flex;flex-direction:column;gap:10px;}
.options.grid{display:grid;grid-template-columns:1fr 1fr;}
@media(max-width:560px){.options.grid{grid-template-columns:1fr;}}
.option{display:flex;align-items:flex-start;gap:.7rem;border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:.82em 1em;cursor:pointer;background:#fff;transition:border-color var(--dur) var(--ease),background var(--dur) var(--ease);}
.option:hover{border-color:var(--accent-line);}
.option.is-selected{border-color:var(--accent);background:var(--accent-soft);}
.option input{margin-top:.18rem;accent-color:var(--accent);width:1.05rem;height:1.05rem;flex:0 0 auto;}
.option .opt-label{font-size:1rem;color:var(--ink);}
.other-inline{margin-top:10px;}

.suggest-block{margin-top:4px;}
.suggest-head{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.suggest-head .eyebrow{color:var(--accent);}
.suggest-head .hint{font-size:.82rem;color:var(--muted);}
.suggest-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.suggest-chip{font-family:var(--font-body);font-size:.9rem;background:#fff;color:var(--chip-ink);border:1.5px dashed var(--accent-line);border-radius:999px;padding:.45em .85em;cursor:pointer;display:inline-flex;align-items:center;gap:.45em;transition:background var(--dur) var(--ease),border-color var(--dur) var(--ease),transform var(--dur) var(--ease);}
.suggest-chip::before{content:"+";font-family:var(--font-mono);font-weight:600;color:var(--accent);}
.suggest-chip:hover{background:var(--accent-soft);transform:translateY(-1px);}
.suggest-chip:focus-visible{outline:3px solid var(--accent-line);outline-offset:2px;}
.suggest-chip.is-added{opacity:.4;cursor:default;border-style:solid;}
.suggest-chip.is-added::before{content:"\2713";}

.tags{display:flex;flex-wrap:wrap;gap:8px;margin:2px 0 12px;}
.tag{font-family:var(--font-body);font-size:.92rem;background:var(--accent-soft);color:var(--chip-ink);border:1px solid var(--accent-line);border-radius:999px;padding:.42em .4em .42em .85em;display:inline-flex;align-items:center;gap:.5em;}
.tag button{border:0;background:rgba(5,174,239,.14);color:var(--chip-ink);width:1.35em;height:1.35em;border-radius:999px;cursor:pointer;font-size:.9rem;line-height:1;display:inline-flex;align-items:center;justify-content:center;}
.tag button:hover{background:var(--accent);color:#fff;}
.tags-empty{color:var(--muted);font-size:.88rem;font-style:italic;margin:2px 0 12px;}
.add-own{display:flex;gap:8px;margin-top:4px;}
.add-own input{flex:1;}
.add-own .btn{flex:0 0 auto;}

/* Assistance: help panel + "not sure" */
.assist{margin-top:10px;display:flex;flex-wrap:wrap;gap:18px;align-items:center;}
.assist-toggle{background:none;border:0;color:var(--accent);font-family:var(--font-mono);font-size:.76rem;letter-spacing:.04em;cursor:pointer;padding:.2em 0;display:inline-flex;align-items:center;gap:.45em;}
.assist-toggle .q{display:inline-flex;align-items:center;justify-content:center;width:1.35em;height:1.35em;border:1.5px solid var(--accent-line);border-radius:50%;font-size:.72rem;font-weight:600;}
.assist-toggle:hover{text-decoration:underline;}
.assist-panel{flex-basis:100%;margin-top:4px;border:1px solid var(--accent-line);background:var(--accent-soft);border-radius:var(--radius-sm);padding:13px 15px;font-size:.93rem;animation:fade .3s var(--ease);}
.assist-panel .a-row{margin:.3em 0;}
.assist-panel .a-lab{font-family:var(--font-mono);font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);display:block;margin-bottom:1px;}
.assist-panel .a-eg{font-style:italic;}
.assist-starter{margin-top:11px;font-family:var(--font-display);font-weight:600;font-size:.82rem;background:#fff;border:1.5px solid var(--accent-line);color:var(--accent);border-radius:999px;padding:.42em .95em;cursor:pointer;}
.assist-starter:hover{background:var(--accent);color:#fff;}
.unsure{display:inline-flex;align-items:center;gap:.5em;font-size:.84rem;color:var(--muted);cursor:pointer;user-select:none;}
.unsure input{accent-color:var(--warn);width:1.05rem;height:1.05rem;}
.field.is-unsure .field-label::after{content:" \00b7 flagged \2018not sure\2019";color:var(--warn);font-family:var(--font-mono);font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;font-weight:400;}
.field.is-unsure textarea,.field.is-unsure input[type=text],.field.is-unsure select{background:#FFFDF6;border-color:#E7D8B8;}

.nav{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 28px 26px;border-top:1px solid var(--line);margin-top:8px;}
.validation-msg{color:var(--flag);font-size:.9rem;font-weight:500;min-height:1.2em;padding:0 28px 4px;}

.summary-head{padding:34px 34px 8px;}
.summary-head .eyebrow{color:var(--accent);}
.summary-head h2{font-size:2rem;font-weight:700;letter-spacing:-.01em;margin:8px 0 8px;}
.summary-head p{color:var(--muted);max-width:62ch;}
.sum-section{padding:20px 34px;border-top:1px solid var(--line);}
.sum-section h3{font-size:1.16rem;display:flex;align-items:center;gap:.6em;margin-bottom:10px;}
.sum-section h3 .num{font-family:var(--font-mono);font-size:.8rem;color:var(--accent);border:1.5px solid var(--accent-line);border-radius:8px;padding:.12em .5em;}
.sum-body{color:var(--ink);}
.sum-body p{margin:.2em 0 .6em;}
.sum-body ul{margin:.2em 0 .4em;padding-left:1.2em;}
.sum-body li{margin:.28em 0;}
.muted-empty{color:var(--muted);font-style:italic;}
.kv{display:grid;grid-template-columns:minmax(150px,220px) 1fr;gap:6px 18px;}
.kv dt{font-family:var(--font-mono);font-size:.76rem;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);padding-top:2px;}
.kv dd{margin:0;}
@media(max-width:560px){.kv{grid-template-columns:1fr;gap:2px;}.kv dd{margin-bottom:8px;}}

.flags{background:#FFF7F2;border:1px solid #F3D6C7;border-radius:var(--radius-sm);padding:4px 0;}
.flag-row{display:flex;align-items:flex-start;gap:.7em;padding:11px 16px;border-bottom:1px solid #F3D6C7;}
.flag-row:last-child{border-bottom:0;}
.flag-row .dot{flex:0 0 auto;width:.7em;height:.7em;border-radius:50%;background:var(--warn);margin-top:.45em;}
.flag-row.crit .dot{background:var(--flag);}
.flag-row .ftext{font-size:.96rem;}
.flag-row .ftag{font-family:var(--font-mono);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:var(--warn);display:block;margin-bottom:1px;}
.flag-row.crit .ftag{color:var(--flag);}
.no-flags{display:flex;align-items:center;gap:.6em;color:var(--ok);font-weight:500;background:#E6F6FD;border:1px solid #BBE6F8;border-radius:var(--radius-sm);padding:14px 16px;}

.next-step{background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:var(--radius-sm);padding:16px 18px;}
.next-step .lab{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);display:block;margin-bottom:6px;}

.download-bar{padding:26px 34px 36px;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:14px;align-items:center;}
.download-bar .dl-note{font-size:.86rem;color:var(--muted);flex:1 1 240px;min-width:200px;}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:.8em 1.3em;border-radius:999px;font-size:.92rem;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity var(--dur) var(--ease),transform var(--dur) var(--ease);z-index:60;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.hidden{display:none!important;}
.fade-in{animation:fade .42s var(--ease);}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

footer.app-foot{text-align:center;color:var(--muted);font-size:.8rem;padding:20px 0 40px;}
.app-foot .mono{font-size:.74rem;letter-spacing:.04em;}

@media(max-width:600px){
  .intro{padding:34px 22px;}
  .intro h1{font-size:1.9rem;}
  .screen-body,.stepper{padding-left:20px;padding-right:20px;}
  .nav{padding-left:20px;padding-right:20px;}
  .summary-head,.sum-section,.download-bar{padding-left:20px;padding-right:20px;}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important;}}
@media print{.app-header,.nav,.download-bar,.toast,.header-actions{display:none!important;}body{background:#fff;}.card{box-shadow:none;border:0;}}

/* role picker (intro) */
.role-pick{margin:4px 0 26px;}
.role-pick-q{font-weight:600;font-size:1.04rem;margin-bottom:11px;}
.role-pick-opt{font-weight:400;color:var(--muted);}
.role-pick-note{font-size:.92rem;color:var(--muted);margin-top:12px;min-height:1.2em;}
.role-pick-note.is-set{color:var(--ink);}
@media(max-width:560px){.role-pick-q{font-size:1rem;}}
</style>
</head>

function currentRole(){ return state.answers && state.answers.role || ''; }
function roleConfig(id){ for(var i=0;i<ROLES.length;i++){ if(ROLES[i].id===id) return ROLES[i]; } return null; }

/* Seed detected domains with the chosen role's domains, so suggestions are
   relevant before any keywords have been typed. */
function seedRoleDomains(answers, found){
  var rc = roleConfig(answers.role);
  if(!rc) return;
  (rc.domains||[]).forEach(function(d){ if(found.indexOf(d)===-1) found.push(d); });
}

/* Overlay the role-specific worked example (and optional why) onto a question's
   default assist. Falls back to the default for unknown roles / questions. */
function effectiveAssist(q){
  if(!q.assist) return q.assist;
  var role = currentRole();
  var ra = (role && ROLE_ASSIST[role]) ? ROLE_ASSIST[role][q.id] : null;
  if(!ra) return q.assist;
  var rc = roleConfig(role);
  return { p:q.assist.p, w:(ra.w||q.assist.w), e:(ra.e||q.assist.e), s:q.assist.s, roleLabel:(rc&&rc.short)||'' };
}

/* Intro role picker — reuses the .options.grid pill styling. */
function paintRolePicker(){
  var host = document.getElementById('rolePickHost');
  if(!host) return;
  var cur = currentRole();
  var html = '<div class="role-pick"><p class="role-pick-q">First &mdash; which best describes your role? <span class="role-pick-opt">(so we can tailor every example and suggestion to you)</span></p>';
  html += '<div class="options grid" role="radiogroup" aria-label="Your role">';
  ROLES.forEach(function(r){
    var sel = cur===r.id;
    html += '<label class="option'+(sel?' is-selected':'')+'"><input type="radio" name="introRole" value="'+r.id+'"'+(sel?' checked':'')+' /><span class="opt-label">'+esc(r.label)+'</span></label>';
  });
  html += '</div><p class="role-pick-note'+(cur?' is-set':'')+'" id="roleNote"></p></div>';
  host.innerHTML = html;
  var note = document.getElementById('roleNote');
  var rc = roleConfig(cur);
  if(rc && rc.id!=='other'){ note.textContent = 'Great — we’ll tailor examples and suggestions to: '+rc.label+'. You can change this anytime.'; }
  else if(rc && rc.id==='other'){ note.textContent = 'No problem — you’ll get the standard guidance, and you can pick a role later if it helps.'; }
  else { note.textContent = 'Optional, but it makes every worked example fit your world.'; }
  host.querySelectorAll('input[name="introRole"]').forEach(function(inp){
    inp.addEventListener('change', function(){ state.answers.role = inp.value; save(); render(); });
  });
}

  if(outs.indexOf('M&E / impact tracker')!==-1 && found.indexOf('me')===-1) found.push('me');
  if(outs.indexOf('Financial model')!==-1 && found.indexOf('finance')===-1) found.push('finance');
  if(outs.indexOf('Forecast / scenario tool')!==-1 && found.indexOf('finance')===-1) found.push('finance');
  seedRoleDomains(answers, found);
  return found;
}
function getSuggestions(kind, answers){
  var set = SUGGEST[kind]; if(!set) return [];
  var out=[]; var push=function(arr){ (arr||[]).forEach(function(s){ if(out.indexOf(s)===-1) out.push(s); }); };
  var domains = detectDomains(answers);
  if(set.domain){ domains.forEach(function(d){ push(set.domain[d]); }); }
  if(set.tool){ var tsel = (answers.tools||[]).concat(answers.platform||[]); tsel.forEach(function(t){ push(set.tool[t]); }); }
  push(set.base);
  return out;
}

/* ---------- State ---------- */
var state = { screen:-1, answers:{} };
var card = document.getElementById('card');
var toastEl = document.getElementById('toast');
var clearBtn = document.getElementById('clearBtn');

function save(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }
function load(){ try{ var raw=localStorage.getItem(STORAGE_KEY); if(raw){ var p=JSON.parse(raw); if(p&&p.answers) return p; } }catch(e){} return null; }
function hasSavedProgress(){ var s=load(); if(!s) return false; return Object.keys(s.answers||{}).length>0; }
function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(function(){ toastEl.classList.remove('show'); },2800); }

/* ---------- Rendering ---------- */
function el(html){ var t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }

function render(){
  card.innerHTML='';
  clearBtn.classList.toggle('hidden', state.screen<0 ? !hasSavedProgress() : false);
  if(state.screen<0) renderIntro();
  else if(state.screen>=SCREENS.length) renderSummary();

}

      '<div id="rolePickHost"></div>'+

function firstUnfinishedScreen(){
  for(var i=0;i<SCREENS.length;i++){ var qs=SCREENS[i].questions; for(var j=0;j<qs.length;j++){ if(qs[j].required && !hasValue(state.answers[qs[j].id])) return i; } }
  return 0;
}
function hasValue(v){ if(v==null) return false; if(Array.isArray(v)) return v.length>0; return String(v).trim().length>0; }

function renderScreen(i){
  var sc=SCREENS[i];
  var node=el('<div class="fade-in"></div>');
  var pct=Math.round((i/SCREENS.length)*100);
  node.appendChild(el(
    '<div class="stepper">'+
      '<div class="stepper-top"><span class="step-title-eyebrow">'+esc(sc.eyebrow)+'</span><span class="step-count">Step '+(i+1)+' of '+SCREENS.length+'</span></div>'+
      '<div class="progress"><div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="'+pct+'" aria-label="Questionnaire progress" style="width:'+pct+'%"></div></div>'+
    '</div>'
  ));
  var body=el('<div class="screen-body"></div>');
  body.appendChild(el('<div class="screen-head"><h2 tabindex="-1">'+esc(sc.title)+'</h2>'+(sc.intro?'<p class="screen-intro">'+esc(sc.intro)+'</p>':'')+'</div>'));
  sc.questions.forEach(function(q){ body.appendChild(renderField(q)); });
  node.appendChild(body);

  ));

  document.getElementById('nextBtn').addEventListener('click', function(){ if(validateScreen(sc)){ state.screen=i+1; save(); render(); } });
  setTimeout(function(){ var h=card.querySelector('.screen-head h2'); if(h) h.focus(); },30);
}

function renderField(q){
  var wrap=el('<div class="field" data-qid="'+q.id+'"></div>');
  if(state.answers[q.id+'__unsure']) wrap.classList.add('is-unsure');
  var labelHtml = esc(q.label) + (q.required?' <span class="req" title="Required">*</span>':' <span class="optional-tag">optional</span>');
  wrap.appendChild(el('<label class="field-label" for="f_'+q.id+'">'+labelHtml+'</label>'));
  if(q.guide) wrap.appendChild(el('<p class="field-guide">'+esc(q.guide)+'</p>'));

  if(q.type==='longtext'){
    var ta=el('<textarea id="f_'+q.id+'"></textarea>'); ta.value=state.answers[q.id]||'';
    ta.addEventListener('input', function(){ state.answers[q.id]=ta.value; save(); });
    wrap.appendChild(ta);
  } else if(q.type==='text'){
    var inp=el('<input type="text" id="f_'+q.id+'" />'); inp.value=state.answers[q.id]||'';
    inp.addEventListener('input', function(){ state.answers[q.id]=inp.value; save(); });
    wrap.appendChild(inp);
  } else if(q.type==='single'){ wrap.appendChild(renderOptionList(q,false)); }
  else if(q.type==='multi'){ wrap.appendChild(renderOptionList(q,true)); }
  else if(q.type==='chips'){ wrap.appendChild(renderChips(q)); }

  appendAssist(wrap,q);
  return wrap;
}

function appendAssist(wrap,q){
  var row=el('<div class="assist"></div>');
  var A = effectiveAssist(q);
  if(A){
    var canStart = A.s && (q.type==='longtext'||q.type==='text');
    var toggle=el('<button type="button" class="assist-toggle" aria-expanded="false"><span class="q">?</span> Need help with this?</button>');
    var panel=el('<div class="assist-panel" hidden></div>');
    var inner='';
    if(A.p) inner+='<div class="a-row"><span class="a-lab">In plain terms</span>'+esc(A.p)+'</div>';
    if(A.w) inner+='<div class="a-row"><span class="a-lab">Why it matters</span>'+esc(A.w)+'</div>';
    if(A.e) inner+='<div class="a-row"><span class="a-lab">'+(A.roleLabel?('For example &middot; '+esc(A.roleLabel)):'For example')+'</span><span class="a-eg">'+esc(A.e)+'</span></div>';
    panel.innerHTML=inner;
    if(canStart){
      var starter=el('<button type="button" class="assist-starter">Use this example as a starting point</button>');
      starter.addEventListener('click', function(){
        var f=card.querySelector('#f_'+q.id); if(!f) return;
        var cur=(state.answers[q.id]||'').trim();
        f.value = cur ? (state.answers[q.id].replace(/\s+$/,'')+'\n'+A.e) : A.e;
        state.answers[q.id]=f.value; save(); f.focus();
        toast('Example added — edit it to fit your situation.');
      });
      panel.appendChild(starter);
    }
    toggle.addEventListener('click', function(){
      var open=panel.hasAttribute('hidden');
      if(open){ panel.removeAttribute('hidden'); toggle.setAttribute('aria-expanded','true'); }
      else { panel.setAttribute('hidden',''); toggle.setAttribute('aria-expanded','false'); }
    });
    row.appendChild(toggle); row.appendChild(panel);
  }
  if(!q.noUnsure){
    var unsureWrap=el('<label class="unsure"><input type="checkbox" /> Not sure yet — flag for later</label>');
    var cb=unsureWrap.querySelector('input'); cb.checked=!!state.answers[q.id+'__unsure'];
    cb.addEventListener('change', function(){
      state.answers[q.id+'__unsure']=cb.checked; save();
      var fld=unsureWrap.closest('.field'); if(fld) fld.classList.toggle('is-unsure', cb.checked);
    });
    row.appendChild(unsureWrap);
  }
  if(row.children.length) wrap.appendChild(row);
}

function renderOptionList(q, multi){
  var grid = q.options.length>4 && q.options.every(function(o){return o.length<24;});
  var box=el('<div class="options'+(grid?' grid':'')+'" role="'+(multi?'group':'radiogroup')+'" aria-label="'+esc(q.label)+'"></div>');
  var cur=state.answers[q.id];
  if(multi && !Array.isArray(cur)){ cur=state.answers[q.id]=(cur?[cur]:[]); }
  q.options.forEach(function(opt){
    var selected = multi ? (cur.indexOf(opt)!==-1) : (cur===opt);
    var rowEl=el('<label class="option'+(selected?' is-selected':'')+'"><input type="'+(multi?'checkbox':'radio')+'" name="'+q.id+'" value="'+esc(opt)+'"'+(selected?' checked':'')+' /><span class="opt-label">'+esc(opt)+'</span></label>');
    var input=rowEl.querySelector('input');
    input.addEventListener('change', function(){
      if(multi){ var a=state.answers[q.id]||[]; if(input.checked){ if(a.indexOf(opt)===-1) a.push(opt); } else { a=a.filter(function(x){return x!==opt;}); } state.answers[q.id]=a; }
      else { state.answers[q.id]=opt; }
      var fieldWrap=rowEl.closest('.field'); fieldWrap.replaceWith(renderField(q)); save();
    });
    box.appendChild(rowEl);
  });
  if(q.allowOther){
    var otherSelected = multi ? ((state.answers[q.id]||[]).indexOf('Other')!==-1) : (state.answers[q.id]==='Other');
    if(otherSelected){
      var ot=el('<div class="other-inline"><input type="text" placeholder="Please specify…" id="f_'+q.id+'_other" value="'+esc(state.answers[q.id+'__other']||'')+'" /></div>');
      var oi=ot.querySelector('input'); oi.addEventListener('input', function(){ state.answers[q.id+'__other']=oi.value; save(); });
      box.appendChild(ot);
    }
  }
  return box;
}

function renderChips(q){
  var box=el('<div class="suggest-block"></div>');
  var arr=state.answers[q.id]; if(!Array.isArray(arr)){ arr=state.answers[q.id]=(arr?[arr]:[]); }
  var tagsWrap=el('<div class="tags" id="tags_'+q.id+'" aria-live="polite"></div>');
  function paintTags(){
    tagsWrap.innerHTML='';
    var a=state.answers[q.id]||[];
    if(a.length===0){ tagsWrap.className='tags-empty'; tagsWrap.textContent='Nothing added yet — tap a suggestion below or add your own.'; return; }
    tagsWrap.className='tags';
    a.forEach(function(v){
      var tag=el('<span class="tag">'+esc(v)+' <button type="button" aria-label="Remove '+esc(v)+'">&times;</button></span>');
      tag.querySelector('button').addEventListener('click', function(){ state.answers[q.id]=(state.answers[q.id]||[]).filter(function(x){return x!==v;}); save(); paintTags(); paintSuggest(); });
      tagsWrap.appendChild(tag);
    });
  }
  box.appendChild(tagsWrap);
  box.appendChild(el('<div class="suggest-head"><span class="eyebrow">Suggestions</span><span class="hint">tap to add</span></div>'));
  var sList=el('<div class="suggest-list" id="sg_'+q.id+'"></div>'); box.appendChild(sList);
  function paintSuggest(){
    sList.innerHTML='';
    var sugg=getSuggestions(q.suggestKind, state.answers); var added=state.answers[q.id]||[]; var shown=0;
    sugg.forEach(function(s){
      var isAdded=added.indexOf(s)!==-1;
      var chip=el('<button type="button" class="suggest-chip'+(isAdded?' is-added':'')+'"'+(isAdded?' disabled aria-disabled="true"':'')+'>'+esc(s)+'</button>');
      if(!isAdded) chip.addEventListener('click', function(){ var a=state.answers[q.id]||[]; if(a.indexOf(s)===-1) a.push(s); state.answers[q.id]=a; save(); paintTags(); paintSuggest(); });
      sList.appendChild(chip); shown++;
    });
    if(shown===0) sList.appendChild(el('<span class="field-guide" style="margin:0;">No suggestions yet — add your own below.</span>'));
  }
  var addRow=el('<div class="add-own"><input type="text" id="f_'+q.id+'" placeholder="Add your own…" /><button type="button" class="btn btn-ghost btn-sm" id="add_'+q.id+'">Add</button></div>');
  var addInput=addRow.querySelector('input'), addBtn=addRow.querySelector('button');
  function addOwn(){ var v=addInput.value.trim(); if(!v) return; var a=state.answers[q.id]||[]; if(a.indexOf(v)===-1) a.push(v); state.answers[q.id]=a; addInput.value=''; save(); paintTags(); paintSuggest(); addInput.focus(); }
  addBtn.addEventListener('click', addOwn);
  addInput.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); addOwn(); } });
  box.appendChild(addRow);
  paintTags(); paintSuggest();
  return box;
}

function validateScreen(sc){
  var vmsg=document.getElementById('vmsg');
  card.querySelectorAll('.input-invalid').forEach(function(n){ n.classList.remove('input-invalid'); });
  for(var k=0;k<sc.questions.length;k++){
    var q=sc.questions[k];
    // A required question is satisfied by an answer OR by being flagged "not sure".
    if(q.required && !hasValue(state.answers[q.id]) && !state.answers[q.id+'__unsure']){
      var node=card.querySelector('#f_'+q.id);
      if(node){ node.classList.add('input-invalid'); node.focus(); }
      vmsg.textContent='Please answer “'+q.label+'” — or tick “Not sure yet” to flag it.';
      return false;
    }
  }
  vmsg.textContent=''; return true;
}

/* ---------- Summary computation (deterministic) ---------- */
function lc(s){ return String(s||'').trim(); }
function firstSentence(s){ s=lc(s); if(!s) return ''; var m=s.match(/^[^.!?]*[.!?]/); return (m?m[0]:s).trim(); }
function lcFirst(s){ s=lc(s); return s? s.charAt(0).toLowerCase()+s.slice(1):''; }
function capFirst(s){ s=lc(s); return s? s.charAt(0).toUpperCase()+s.slice(1):''; }
function stripPeriod(s){ return lc(s).replace(/[.\s]+$/,''); }
function listOrEmpty(a){ return (a&&a.length)?a:[]; }
function joinAnd(arr){ arr=arr.filter(Boolean); if(arr.length<=1) return arr.join(''); if(arr.length===2) return arr[0]+' and '+arr[1]; return arr.slice(0,-1).join(', ')+' and '+arr[arr.length-1]; }
function resolveMulti(id){ var a=(state.answers[id]||[]).slice(); var other=lc(state.answers[id+'__other']); if(other){ a=a.filter(function(x){return x!=='Other';}); a.push(other); } return a; }
function questionLabel(id){ for(var i=0;i<SCREENS.length;i++){ var qs=SCREENS[i].questions; for(var j=0;j<qs.length;j++){ if(qs[j].id===id) return qs[j].label; } } return id; }

function computeSummary(){
  var A=state.answers;
  var outputs=resolveMulti('outputs'), tools=resolveMulti('tools'), platform=resolveMulti('platform');
  var constraints=resolveMulti('constraints'), testTypes=resolveMulti('testTypes'), trainingFormat=resolveMulti('trainingFormat');

  var objective = lc(A.topOutcome) ? capFirst(stripPeriod(A.topOutcome))+(firstSentence(A.problem)?' — resolving the core problem that '+lcFirst(stripPeriod(firstSentence(A.problem))):'')+'.' : null;

  var scopeMap={'Operational dashboard':'an operational dashboard','Executive summary view':'an executive summary view','M&E / impact tracker':'an M&E / impact tracker','Financial model':'a financial model','Power Platform app':'a Power Platform app','Workflow automation':'workflow automation','Scheduled / automated report':'automated reporting','Data-entry form':'structured data capture','Forecast / scenario tool':'forecasting / scenario modelling'};
  var scopeTokens=[]; outputs.forEach(function(o){ var t=scopeMap[o]||(o?o.toLowerCase():null); if(t&&scopeTokens.indexOf(t)===-1) scopeTokens.push(t); });
  if(scopeTokens.length===0 && listOrEmpty(A.structure).length) scopeTokens.push(A.structure[0].toLowerCase());
  scopeTokens.push('data validation'); scopeTokens.push('documentation & user training');

  // Gaps: critical missing inputs + every "not sure" flag
  var gaps=[]; function gap(tag,text,crit){ gaps.push({tag:tag,text:text,crit:!!crit}); }
  if(!lc(A.topOutcome)) gap('Priority unclear','No single most-important outcome named — the engagement lacks a clear anchor.',true);
  if(lc(A.successMeasure).length<15) gap('Not measurable','No measurable success metric provided — define how success will be quantified.',true);
  if(listOrEmpty(A.metrics).length===0) gap('No metrics','No key metrics named — the solution’s measurable outputs are undefined.');
  if(listOrEmpty(A.dataSources).length===0) gap('Data sources unclear','No data sources identified — to confirm before architecture.');
  if(!lc(A.reconciliationSource)) gap('No source of truth','No reconciliation source of truth — needed to prove data integrity.');
  if(!lc(A.maintainer)) gap('No maintenance owner','No post-handover maintenance owner named.');
  if(!lc(A.integrations)) gap('Integration unclear','Integration / no-touch systems not specified.');
  var bb=lc(A.budgetBand); if(!bb||bb==='Prefer to discuss') gap('Budget undisclosed','Budget band not disclosed — needed to right-size scope.');
  // unsure flags
  SCREENS.forEach(function(sc){ sc.questions.forEach(function(q){ if(A[q.id+'__unsure']) gap('Flagged “not sure”', questionLabel(q.id)+' — flagged to confirm later.', false); }); });

  var et=lc(A.engagementType);
  var shape = et==='Build + ongoing support / retainer' ? 'a retainer (build plus ongoing support)' : et==='One-off build' ? 'a one-off project build' : 'an engagement shape to be confirmed (project vs retainer)';

  return {
    clientName:lc(A.clientName), objective:objective, scopeDirection: capFirst(joinAnd(scopeTokens)),
    // Part 1
    problem:lc(A.problem), impact:lc(A.impact), currentHandling:lc(A.currentHandling),
    successVision:lc(A.successVision), topOutcome:lc(A.topOutcome), outputs:outputs,
    successMeasure:lc(A.successMeasure), wow:lc(A.wow), budgetBand:bb, timeline:lc(A.timeline), engagementType:et,
    // Part 2
    structure:listOrEmpty(A.structure), metrics:listOrEmpty(A.metrics), dimensions:listOrEmpty(A.dimensions),
    tools:tools, dataSources:listOrEmpty(A.dataSources), dataLocation:lc(A.dataLocation), dataOwners:lc(A.dataOwners), refreshFreq:lc(A.refreshFreq),
    entities:listOrEmpty(A.entities), grain:lc(A.grain), relationships:lc(A.relationships), referenceData:listOrEmpty(A.referenceData),
    processSteps:listOrEmpty(A.processSteps), triggers:listOrEmpty(A.triggers), approvals:lc(A.approvals), exceptions:lc(A.exceptions),
    components:listOrEmpty(A.components), platform:platform, integrations:lc(A.integrations), security:lc(A.security),
    volume:lc(A.volume), performance:lc(A.performance), availability:lc(A.availability),
    // Part 3
    buildItems:listOrEmpty(A.buildItems), businessRules:lc(A.businessRules), formulaNotes:lc(A.formulaNotes), edgeCases:lc(A.edgeCases),
    automations:listOrEmpty(A.automations), autoTriggers:listOrEmpty(A.autoTriggers), errorHandling:lc(A.errorHandling),
    naming:lc(A.naming), versionControl:lc(A.versionControl), environments:lc(A.environments),
    testTypes:testTypes, testData:listOrEmpty(A.testData), reconciliationSource:lc(A.reconciliationSource),
    acceptanceCriteria:lc(A.acceptanceCriteria), passThreshold:lc(A.passThreshold), signOff:lc(A.signOff),
    // Part 4
    decisionMakers:lc(A.decisionMakers), endUsers:lc(A.endUsers), roles:listOrEmpty(A.roles), views:listOrEmpty(A.views), techComfort:lc(A.techComfort),
    builder:lc(A.builder), maintainer:lc(A.maintainer), trainingNeeds:lc(A.trainingNeeds), trainingFormat:trainingFormat,
    supportArrangement:lc(A.supportArrangement), schedule:lc(A.schedule), goLive:lc(A.goLive),
    // Part 5
    constraints:constraints, constraintDetail:lc(A.constraintDetail), compliance:lc(A.compliance),
    risks:listOrEmpty(A.risks), assumptions:lc(A.assumptions), reviewFocus:lc(A.reviewFocus), reviewCadence:lc(A.reviewCadence),
    engagementShape:shape,
    gaps:gaps,
    nextStep:'Generate the Engagement Pack from this questionnaire. It drafts all six stage documents — Requirements & Scope, Architecture & Data Model, Build Plan, Test Plan, User Guide & Handover, and an Optimisation Review framework — flagging every open item below for you to firm up. Indicated engagement shape: '+shape+'.'
  };
}

function renderSummary(){
  var s=computeSummary();
  var node=el('<div class="fade-in"></div>');
  node.appendChild(el(
    '<div class="summary-head">'+
      '<div class="eyebrow">Engagement Summary · JDRS</div>'+
      '<h2 tabindex="-1">'+(s.clientName?esc(s.clientName)+' — ':'')+'what this engagement needs</h2>'+
      '<p>Compiled from your answers across all six stages. Gaps and “not sure” flags are surfaced, not papered over — that is the audit discipline made visible. Download below, then feed the JSON to the JDRS Engagement Pack generator.</p>'+
    '</div>'
  ));
  function sec(num,title,inner){ return '<div class="sum-section"><h3><span class="num">'+num+'</span>'+esc(title)+'</h3><div class="sum-body">'+inner+'</div></div>'; }
  function para(v){ return v?'<p>'+esc(v)+'</p>':'<p class="muted-empty">Not provided.</p>'; }
  function bullets(a){ return (a&&a.length)?'<ul>'+a.map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ul>':'<p class="muted-empty">Not provided.</p>'; }
  function kvrow(k,v,e){ return '<dt>'+esc(k)+'</dt><dd>'+(v?esc(v):'<span class="muted-empty">'+esc(e||'Not provided')+'</span>')+'</dd>'; }

  var html='';
  html+=sec('01','Engagement Overview',
    (s.objective?'<p><strong>Objective:</strong> '+esc(s.objective)+'</p>':'<p class="muted-empty">Objective not yet defined.</p>')+
    '<p><strong>Indicative scope:</strong> '+esc(s.scopeDirection)+'.</p>'+
    para(s.problem));
  html+=sec('02','Requirements & Scope (→ Discover)',
    '<p><strong>Most important outcome:</strong> '+(s.topOutcome?esc(s.topOutcome):'<span class="muted-empty">Not set</span>')+'</p>'+
    '<p><strong>Required outputs:</strong></p>'+bullets(s.outputs)+
    '<p><strong>Success measured by:</strong> '+(s.successMeasure?esc(s.successMeasure):'<span class="muted-empty">Not defined</span>')+'</p>');
  html+=sec('03','Architecture, Workflow & Data Model (→ Structure)',
    '<p><strong>Solution structure:</strong></p>'+bullets(s.structure)+
    '<dl class="kv">'+kvrow('Data sources',s.dataSources.join(', '),'None listed')+kvrow('Refresh',s.refreshFreq,'Not set')+kvrow('Core entities',s.entities.join(', '),'None listed')+kvrow('Grain',s.grain,'Undefined')+kvrow('Platform',s.platform.join(', '),'Not set')+'</dl>'+
    '<p><strong>Process:</strong> '+(s.processSteps.length?esc(s.processSteps.join(' → ')):'<span class="muted-empty">Not mapped</span>')+'</p>');
  html+=sec('04','Build & Test (→ Build, Test)',
    '<p><strong>Key metrics:</strong> '+(s.metrics.length?esc(joinAnd(s.metrics)):'<span class="muted-empty">None named</span>')+'</p>'+
    '<p><strong>To build:</strong></p>'+bullets(s.buildItems)+
    '<p><strong>Automation:</strong> '+(s.automations.length?esc(s.automations.join(', ')):'<span class="muted-empty">None</span>')+'</p>'+
    '<dl class="kv">'+kvrow('Test types',s.testTypes.join(', '),'Not chosen')+kvrow('Source of truth',s.reconciliationSource,'Not set')+kvrow('Acceptance',s.acceptanceCriteria,'Not defined')+'</dl>');
  html+=sec('05','People, Handover & Continuity (→ Handover)',
    '<dl class="kv">'+kvrow('Decision-makers',s.decisionMakers,'Not named')+kvrow('End users',s.endUsers,'Not named')+'</dl>'+
    '<p><strong>Roles:</strong> '+(s.roles.length?esc(s.roles.join(', ')):'<span class="muted-empty">None</span>')+'</p>'+
    '<dl class="kv">'+kvrow('Maintainer',s.maintainer,'Not named')+kvrow('Support',s.supportArrangement,'Not set')+kvrow('Go-live',s.goLive,'Not set')+'</dl>');
  html+=sec('06','Risk & Optimisation (→ Optimise framework)',
    '<dl class="kv">'+kvrow('Budget band',s.budgetBand,'Undisclosed')+kvrow('Constraints',s.constraints.join(', '),'None flagged')+kvrow('Compliance',s.compliance,'None specified')+'</dl>'+
    '<p><strong>Known risks:</strong> '+(s.risks.length?esc(s.risks.join(', ')):'<span class="muted-empty">None listed</span>')+'</p>'+
    '<p><strong>Review focus once live:</strong> '+(s.reviewFocus?esc(s.reviewFocus):'<span class="muted-empty">To define</span>')+(s.reviewCadence?' ('+esc(s.reviewCadence)+')':'')+'</p>');

  var gapsHtml;
  if(s.gaps.length===0) gapsHtml='<div class="no-flags">&#10003; No gaps or open flags — this questionnaire is well-formed and ready to generate the pack.</div>';
  else gapsHtml='<div class="flags">'+s.gaps.map(function(g){return '<div class="flag-row'+(g.crit?' crit':'')+'"><span class="dot"></span><span class="ftext"><span class="ftag">'+esc(g.tag)+'</span>'+esc(g.text)+'</span></div>';}).join('')+'</div>';
  html+=sec('07','Flagged Gaps & Open Questions', gapsHtml);
  html+=sec('08','Recommended Next Step', '<div class="next-step"><span class="lab">Next — generate the Engagement Pack</span>'+esc(s.nextStep)+'</div>');

  node.appendChild(el('<div>'+html+'</div>'));
  var submitBtn = SUBMIT_URL ? '<button class="btn btn-primary" id="submitBtn" type="button">&#10148; Submit to JDRS</button>' : '';
  var reportClass = SUBMIT_URL ? 'btn btn-ghost' : 'btn btn-primary';
  var dlNote = SUBMIT_URL
    ? '<strong>Submit to JDRS</strong> sends your responses straight to JDRS, who will prepare your engagement pack — that’s all you need to do. You can also keep a copy for your records.'
    : 'The <strong>HTML summary</strong> is your record. The <strong>JSON</strong> is the input for the JDRS Engagement Pack generator.';
  if(SUBMIT_URL && TURNSTILE_SITEKEY){ node.appendChild(el('<div class="cf-wrap" style="padding:16px 34px 0;"><div id="cf-box"></div></div>')); }
  node.appendChild(el(
    '<div class="download-bar">'+
      submitBtn+
      '<button class="'+reportClass+'" id="dlReport" type="button">&#8595; Download '+(SUBMIT_URL?'a copy':'summary')+' (HTML)</button>'+
      '<button class="btn btn-ghost" id="dlJson" type="button">&#8681; Download data (JSON)</button>'+
      '<button class="btn btn-ghost" id="backToEdit" type="button">&larr; Back to edit</button>'+
      '<span class="dl-note">'+dlNote+'</span>'+
    '</div>'
  ));
  card.appendChild(node);
  var h2=card.querySelector('.summary-head h2'); if(h2) h2.focus();
  document.getElementById('backToEdit').addEventListener('click', function(){ state.screen=SCREENS.length-1; save(); render(); });
  document.getElementById('dlReport').addEventListener('click', function(){ downloadReport(s); });
  document.getElementById('dlJson').addEventListener('click', function(){ downloadJson(s); });
  var sb=document.getElementById('submitBtn'); if(sb) sb.addEventListener('click', function(){ submitToJDRS(s, sb); });
  turnstileWidgetId=null; renderTurnstile();
}

function renderTurnstile(){
  if(!(SUBMIT_URL && TURNSTILE_SITEKEY)) return;
  var box=document.getElementById('cf-box'); if(!box) return;
  if(turnstileWidgetId!==null) return;
  if(window.turnstile && turnstile.render){
    try{ turnstileWidgetId = turnstile.render('#cf-box', { sitekey: TURNSTILE_SITEKEY, theme:'light' }); }catch(e){}
  } else {
    setTimeout(renderTurnstile, 300); // api.js loads async — retry until ready
  }
}

function submitToJDRS(s, btn){
  if(!SUBMIT_URL){ toast('Submission isn’t configured yet — please download a copy and email it to JDRS.'); return; }
  var token='';
  if(TURNSTILE_SITEKEY){
    token = (window.turnstile && turnstileWidgetId!==null) ? turnstile.getResponse(turnstileWidgetId) : '';
    if(!token){ toast('Please complete the verification check first.'); return; }
  }
  btn.disabled=true; var old=btn.innerHTML; btn.textContent='Submitting…';
  var payload={ meta:{ tool:'JDRS Engagement Questionnaire', stage:'All (six-stage prep)', version:TOOL_VERSION, generated:new Date().toISOString() }, answers:state.answers, summary:s };
  if(token) payload.turnstileToken=token;
  fetch(SUBMIT_URL, {method:'POST', headers:{'Content-Type':'application/json','x-jdrs-form-key':FORM_KEY}, body:JSON.stringify(payload)})
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json().catch(function(){return {};}); })
    .then(function(){ try{ localStorage.setItem(STORAGE_KEY+'_submitted','1'); }catch(e){} showSubmitted(s); })
    .catch(function(){ btn.disabled=false; btn.innerHTML=old; if(window.turnstile && turnstileWidgetId!==null){ try{ turnstile.reset(turnstileWidgetId); }catch(e){} } toast('Couldn’t reach JDRS — please download a copy and email it instead.'); });
}

function showSubmitted(s){
  card.innerHTML='';
  var node=el(
    '<div class="intro fade-in">'+
      '<div class="eyebrow">JDRS · Submitted</div>'+
      '<h1>Thank you — your responses are on their way to JDRS</h1>'+
      '<p class="lede">JDRS will use your answers to prepare your engagement documentation pack and will be in touch. There’s nothing more you need to do — you can close this page.</p>'+
      '<div class="intro-foot"><button id="dlAfter" class="btn btn-ghost" type="button">&#8595; Download a copy for your records</button><button id="overAfter" class="btn btn-ghost" type="button">Start a new questionnaire</button></div>'+
    '</div>'
  );
  card.appendChild(node);
  clearBtn.classList.add('hidden');
  document.getElementById('dlAfter').addEventListener('click', function(){ downloadReport(s); });
  document.getElementById('overAfter').addEventListener('click', clearAll);
}

/* ---------- Downloads ---------- */
function todayStr(){ var d=new Date(); var p=function(n){return (n<10?'0':'')+n;}; return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
function prettyDate(){ try{ return new Date().toLocaleDateString('en-ZA',{year:'numeric',month:'long',day:'numeric'}); }catch(e){ return todayStr(); } }
function triggerDownload(blob, filename){ var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },100); }
function fileStem(s){ var c=lc(s.clientName).replace(/[^A-Za-z0-9]+/g,'_').replace(/^_|_$/g,''); return 'JDRS_Engagement_Questionnaire_'+(c?c+'_':'')+todayStr(); }

function downloadJson(s){
  var payload={ meta:{ tool:'JDRS Engagement Questionnaire', stage:'All (six-stage prep)', version:TOOL_VERSION, generated:new Date().toISOString() }, answers:state.answers, summary:s };
  triggerDownload(new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}), fileStem(s)+'.json');
  toast('JSON downloaded — feed this to the Engagement Pack generator.');
}
function downloadReport(s){ triggerDownload(new Blob([buildReportHtml(s)],{type:'text/html'}), fileStem(s)+'.html'); toast('Summary downloaded.'); }

function rEsc(s){ return esc(s); }
function rPara(v){ return v?'<p>'+rEsc(v)+'</p>':'<p class="empty">Not provided.</p>'; }
function rBullets(a){ return (a&&a.length)?'<ul>'+a.map(function(x){return '<li>'+rEsc(x)+'</li>';}).join('')+'</ul>':'<p class="empty">Not provided.</p>'; }

function buildAnswersDump(){
  var out='';
  SCREENS.forEach(function(sc){
    out+='<div class="qa"><div class="q" style="color:var(--accent);font-size:.74rem;font-family:var(--fm);letter-spacing:.12em;text-transform:uppercase;">'+rEsc(sc.eyebrow)+' · '+rEsc(sc.title)+'</div></div>';
    sc.questions.forEach(function(q){
      var val=state.answers[q.id], disp;
      if(Array.isArray(val)){ var arr=val.slice(); if(q.allowOther){ var o=lc(state.answers[q.id+'__other']); if(o){ arr=arr.filter(function(x){return x!=='Other';}); arr.push(o); } } disp=arr.length?arr.join(', '):''; }
      else disp=lc(val);
      var flagged=state.answers[q.id+'__unsure']?' <span class="flagged">[flagged: not sure]</span>':'';
      out+='<div class="qa"><div class="q">'+rEsc(q.label)+flagged+'</div>'+(disp?'<div class="a">'+rEsc(disp)+'</div>':'<div class="a empty">'+(state.answers[q.id+'__unsure']?'Flagged to confirm later.':'Not provided.')+'</div>')+'</div>';
    });
  });
  return out;
}

/* ---------- Clear / boot ---------- */
function clearAll(){ if(!confirm('Start over? This permanently clears all answers saved in this browser.')) return; try{ localStorage.removeItem(STORAGE_KEY); }catch(e){} state={screen:-1,answers:{}}; render(); toast('Cleared — starting fresh.'); }
clearBtn.addEventListener('click', clearAll);

var saved=load();
if(saved){ state.answers=saved.answers||{}; state.screen=-1; }
render();

})();
